<template>
    <lightning-card title="Opportunity Workbench" icon-name="standard:opportunity">
        <div class="slds-p-horizontal_medium slds-p-top_small">
            <lightning-layout multiple-rows vertical-align="end">
                <lightning-layout-item size="12" medium-device-size="4" padding="around-small">
                    <lightning-input
                        type="number"
                        name="minAmount"
                        label="Minimum Amount"
                        value={minAmount}
                        onchange={handleMinAmountChange}
                        min="0"
                    ></lightning-input>
                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="3" padding="around-small">
                    <lightning-button
                        label="Refresh"
                        onclick={handleRefresh}
                        disabled={isLoading}
                    ></lightning-button>
                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="5" padding="around-small">
                    <div class="slds-text-align_right">
                        <lightning-button
                            variant="brand"
                            label="Mark Selected as Won"
                            onclick={handleMarkWon}
                            disabled={disableMarkWon}
                        ></lightning-button>
                    </div>
                </lightning-layout-item>
            </lightning-layout>

            <template lwc:if={errorMessage}>
                <div class="slds-text-color_error slds-m-top_small">{errorMessage}</div>
            </template>

            <template lwc:if={successMessage}>
                <div class="slds-text-color_success slds-m-top_small">{successMessage}</div>
            </template>
        </div>

        <template lwc:if={isLoading}>
            <div class="slds-is-relative slds-p-around_medium">
                <lightning-spinner alternative-text="Loading opportunities"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={rows.length}>
            <div class="slds-p-horizontal_medium slds-p-bottom_small">
                <lightning-datatable
                    key-field="id"
                    data={rows}
                    columns={columns}
                    selected-rows={selectedRowIds}
                    onrowselection={handleRowSelection}
                    hide-checkbox-column={hideCheckboxColumn}
                ></lightning-datatable>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium slds-grid slds-grid_align-spread">
                <div>
                    Page {pageNumber}
                </div>
                <div>
                    <lightning-button-group>
                        <lightning-button
                            label="Previous"
                            onclick={handlePrevious}
                            disabled={disablePrevious}
                        ></lightning-button>
                        <lightning-button
                            label="Next"
                            onclick={handleNext}
                            disabled={disableNext}
                        ></lightning-button>
                    </lightning-button-group>
                </div>
            </div>
        </template>

        <template lwc:elseif={hasLoaded}>
            <div class="slds-p-around_medium slds-text-color_weak">
                No open opportunities match the current filter.
            </div>
        </template>
    </lightning-card>
</template>
